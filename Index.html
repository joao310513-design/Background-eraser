<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 450px;
            width: 85%;
            border: 1px solid #333;
        }

        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            margin-bottom: 15px;
            border: 2px solid #4dabf7;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(77, 171, 247, 0.3);
        }

        h1 { margin: 5px 0; font-size: 32px; color: #4dabf7; letter-spacing: 1px; }
        p { color: #888; margin-bottom: 35px; font-size: 14px; }

        .btn-upload {
            background: linear-gradient(135deg, #3f51b5, #2196f3);
            color: white;
            padding: 18px 35px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            border: none;
            font-size: 16px;
        }

        .btn-upload:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4); }

        input[type="file"] { display: none; }

        #preview-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        canvas {
            max-width: 100%;
            border-radius: 12px;
            background-image: linear-gradient(45deg, #252525 25%, transparent 25%), 
                              linear-gradient(-45deg, #252525 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #252525 75%), 
                              linear-gradient(-45deg, transparent 75%, #252525 75%);
            background-size: 20px 20px;
            border: 1px solid #444;
        }

        .loader {
            display: none;
            margin-top: 20px;
            color: #4dabf7;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="p_diddy_icon.png" alt="CleanCut Icon" class="app-icon">
    
    <h1>CleanCut</h1>
    <p>Tecnologia de elite para apagar fundos.</p>

    <label for="upload" class="btn-upload">
        ✨ SELECIONAR IMAGEM
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">Processando com IA... Aguarde.</div>

    <div id="preview-container">
        <h3 style="color:#888; font-size: 14px;">RESULTADO:</h3>
        <canvas id="canvas"></canvas>
        <br><br>
        <a id="download-link" class="btn-upload" style="background: #2e7d32;">BAIXAR EM PNG</a>
    </div>
</div>

<script>
    // Sua chave de API configurada
    const API_KEY = "WL2ETBv1shPw9Xg6U6x7TgFU"; 

    const upload = document.getElementById('upload');
    const loader = document.getElementById('loader');
    const previewContainer = document.getElementById('preview-container');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadLink = document.getElementById('download-link');

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loader.style.display = 'block';
        previewContainer.style.display = 'none';

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        try {
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    loader.style.display = 'none';
                    previewContainer.style.display = 'block';
                    
                    downloadLink.href = url;
                    downloadLink.download = "cleancut_sem_fundo.png";
                };
                img.src = url;
            } else {
                const errorData = await response.json();
                alert("Erro da IA: " + errorData.errors[0].title);
                loader.style.display = 'none';
            }
        } catch (error) {
            alert("Erro de conexão. Verifique sua internet!");
            loader.style.display = 'none';
        }
    });
</script>

</body>
</html>
