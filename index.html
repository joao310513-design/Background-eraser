<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* MANTIVE TODO O SEU CSS INCRÍVEL AQUI */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #0f0f23);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .app-icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            animation: pulse 2s infinite;
        }
        .app-icon {
            width: 100%;
            height: 100%;
            border-radius: 28px;
            border: 3px solid #4dabf7;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(77, 171, 247, 0.4);
        }
        .icon-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #2196f3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #1a1a1a;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        h1 { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #4dabf7, #00d4ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); margin-bottom: 20px; }
        
        #info-credito {
            color: #4dabf7;
            font-weight: 600;
            background: rgba(77, 171, 247, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .btn-upload {
            background: linear-gradient(135deg, #4dabf7, #2196f3);
            color: white; padding: 20px 50px; border-radius: 25px; cursor: pointer;
            font-weight: 600; display: inline-flex; align-items: center; gap: 12px; border: none;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(77, 171, 247, 0.4);
        }
        .btn-upload:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(77, 171, 247, 0.6); }

        .loader { display: none; margin-top: 35px; color: #4dabf7; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(77, 171, 247, 0.2); border-top: 3px solid #4dabf7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #preview-container { margin-top: 40px; display: none; }
        canvas { max-width: 100%; border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.1); }
        .btn-download { background: linear-gradient(135deg, #2e7d32, #4caf50); margin-top: 25px; text-decoration: none;}
        .credit { margin-top: 40px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); }
        .credit a { color: #4dabf7; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-icon-container">
        <img src="p_diddy_icon.png" alt="CleanCut" class="app-icon">
        <div class="icon-badge"><i class="fas fa-cut" style="color: white; font-size: 1.2rem;"></i></div>
    </div>
    
    <h1>CleanCut</h1>
    <p class="subtitle">✨ IA de elite para remover fundos</p>

    <div id="info-credito">Carregando créditos...</div>

    <br>

    <label for="upload" class="btn-upload">
        <i class="fas fa-cloud-upload-alt"></i> SELECIONAR IMAGEM
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">
        <div class="spinner"></div>
        Processando com IA de ponta...
    </div>

    <div id="preview-container">
        <h3 style="margin-bottom: 20px; color: #4dabf7;">🎉 Resultado Perfeito!</h3>
        <canvas id="canvas"></canvas>
        <br>
        <a id="download-link" class="btn-upload btn-download">
            <i class="fas fa-download"></i> BAIXAR PNG
        </a>
    </div>

    <div class="credit">
        Feito com ❤️ por <a href="https://twitter.com/joaoxxr1" target="_blank">@joaoxxr1</a>
    </div>
</div>

<script>
    const API_KEY = "WL2ETBv1shPw9Xg6U6x7TgFU"; 

    const upload = document.getElementById('upload');
    const loader = document.getElementById('loader');
    const previewContainer = document.getElementById('preview-container');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadLink = document.getElementById('download-link');
    const infoCredito = document.getElementById('info-credito');

    async function atualizarCreditos() {
        try {
            const response = await fetch("https://api.remove.bg/v1.0/account", {
                headers: { "X-Api-Key": API_KEY }
            });
            const data = await response.json();
            infoCredito.innerText = "Créditos restantes: " + data.data.attributes.credits.total;
        } catch (e) { infoCredito.innerText = "Créditos: Offline"; }
    }

    atualizarCreditos();

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loader.style.display = 'block';
        previewContainer.style.display = 'none';

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        try {
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    loader.style.display = 'none';
                    previewContainer.style.display = 'block';
                    downloadLink.href = url;
                    downloadLink.download = `cleancut_${Date.now()}.png`;
                    atualizarCreditos();
                };
                img.src = url;
            } else {
                alert("Erro ao processar imagem.");
                loader.style.display = 'none';
            }
        } catch (error) {
            alert("Erro de conexão!");
            loader.style.display = 'none';
        }
    });
</script>
</body>
</html>
