<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #0f0f23);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #4dabf7, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(78, 171, 247, 0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #4dabf7, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(78, 171, 247, 0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CONTADOR DE IMAGENS (NOVO) ===== */
        .api-counter {
            background: rgba(77, 171, 247, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(77, 171, 247, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .api-counter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #4dabf7, #00d4ff);
        }

        .counter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .counter-icon {
            color: #4dabf7;
            font-size: 1.2rem;
        }

        .counter-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .counter-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4dabf7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .counter-limit {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .progress-container {
            margin-top: 12px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4dabf7, #00d4ff, #00ff88);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .warning .counter-value {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .warning .progress-fill {
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
        }

        /* Fim contador */

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 25px;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #4dabf7, #2196f3) padding-box,
                        linear-gradient(135deg, #4dabf7, #00d4ff, #4dabf7) border-box;
            box-shadow: 
                0 0 30px rgba(77, 171, 247, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            animation: pulse 2s infinite;
            position: relative;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .app-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 50px rgba(77, 171, 247, 0.6);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4dabf7, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-upload {
            background: linear-gradient(135deg, #4dabf7, #2196f3);
            color: white;
            padding: 20px 50px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(77, 171, 247, 0.4);
            width: 100%;
            justify-content: center;
        }

        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-upload::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn-upload:hover::before:not(:disabled) {
            left: 100%;
        }

        .btn-upload:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(77, 171, 247, 0.6);
        }

        .btn-upload:active:not(:disabled) {
            transform: translateY(-2px) scale(1);
        }

        input[type="file"] { display: none; }

        .loader {
            display: none;
            margin-top: 35px;
            color: #4dabf7;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(77, 171, 247, 0.2);
            border-top: 3px solid #4dabf7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #preview-container {
            margin-top: 40px;
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #4dabf7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        canvas:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(77, 171, 247, 0.2);
        }

        .btn-download {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            margin-top: 25px;
            padding: 18px 45px;
            font-size: 1.1rem;
        }

        .credit {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .credit a {
            color: #4dabf7;
            text-decoration: none;
            font-weight: 600;
        }

        .credit a:hover {
            color: #00d4ff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
                margin: 10px;
            }
            h1 { font-size: 2.2rem; }
            .app-icon { width: 100px; height: 100px; }
            .api-counter { padding: 16px; }
            .counter-value { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ===== CONTADOR DE IMAGENS (NOVO) ===== -->
    <div class="api-counter" id="apiCounter">
        <div class="counter-header">
            <div>
                <i class="fas fa-images counter-icon"></i>
                <span class="counter-label">Imagens processadas</span>
            </div>
            <i class="fas fa-crown" style="color: #ffd700; font-size: 1.1rem;"></i>
        </div>
        <div class="counter-value" id="imageCount">0</div>
        <div class="counter-limit">/ 50 GRÁTIS por mês</div>
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- Ícone animado com efeito glass -->
    <div class="app-icon" style="
        background: url('p_diddy_icon.png') center/cover;
        background-color: #1a1a2e;
    ">
        <i class="fas fa-cut" style="font-size: 3rem; color: #4dabf7; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></i>
    </div>
    
    <h1>CleanCut</h1>
    <p class="subtitle">✨ IA de elite para remover fundos em segundos<br><span style="font-size: 0.9em; opacity: 0.8;">Tecnologia profissional • Resultados perfeitos</span></p>

    <label for="upload" class="btn-upload" id="uploadLabel">
        <i class="fas fa-cloud-upload-alt"></i>
        SELECIONAR IMAGEM
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">
        <div class="spinner"></div>
        Processando com IA de ponta... <span style="font-size: 0.9em;">(pode levar alguns segundos)</span>
    </div>

    <div id="preview-container">
        <h3 class="preview-title">🎉 Resultado Perfeito!</h3>
        <canvas id="canvas"></canvas>
        <br>
        <a id="download-link" class="btn-upload btn-download">
            <i class="fas fa-download"></i>
            BAIXAR PNG TRANSPARENTE
        </a>
    </div>

    <div class="credit">
        <i class="fas fa-heart" style="color: #ff6b9d;"></i>
        Feito com ❤️ por <a href="https://twitter.com/joaoxxr1" target="_blank">@joaoxxr1</a>
    </div>
</div>

<script>
    // ===== CONTADOR DE IMAGENS (CORRIGIDO) =====
    class ImageCounter {
        constructor() {
            this.maxImages = 50;
            this.storageKey = 'cleancut_image_count';
            this.monthKey = 'cleancut_month';
            this.count = 41; // ✅ FIXO EM 41 IMAGENS USADAS
            this.init();
        }

        init() {
            this.loadCounter();
            this.updateDisplay();
        }

        loadCounter() {
            const savedCount = localStorage.getItem(this.storageKey);
            const savedMonth = localStorage.getItem(this.monthKey);
            const currentMonth = new Date().getMonth() + 1;

            // ✅ Força 41 imagens para demonstração
            if (savedCount && savedMonth == currentMonth) {
                this.count = Math.min(parseInt(savedCount), this.maxImages);
            } else {
                this.count = 41; // ✅ 41 imagens usadas
                this.saveCounter();
            }
        }

        saveCounter() {
            localStorage.setItem(this.storageKey, this.count.toString());
            localStorage.setItem(this.monthKey, (new Date().getMonth() + 1).toString());
        }

        increment() {
            if (this.count < this.maxImages) {
                this.count++;
                this.saveCounter();
                this.updateDisplay();
                return true;
            }
            return false;
        }

        updateDisplay() {
            const counterEl = document.getElementById('apiCounter');
            const countEl = document.getElementById('imageCount');
            const progressEl = document.getElementById('progressFill');

            countEl.textContent = this.count;
            
            const percentage = (this.count / this.maxImages) * 100;
            progressEl.style.width = percentage + '%';

            // ✅ Adiciona classe warning se >80%
            if (percentage > 80) {
                counterEl.classList.add('warning');
            } else {
                counterEl.classList.remove('warning');
            }

            // ✅ Desabilita upload se limite atingido
            if (this.count >= this.maxImages) {
                document.getElementById('uploadLabel').style.opacity = '0.6';
                document.getElementById('uploadLabel').innerHTML = 
                    '<i class="fas fa-lock"></i> LIMITE ATINGIDO (50/50)';
            }
        }

        canProcess() {
            return this.count < this.maxImages;
        }
    }

    // Inicializa contador
    const imageCounter = new ImageCounter();

    // Upload de imagem
    const uploadInput = document.getElementById('upload');
    const uploadLabel = document.getElementById('uploadLabel');
    const loader = document.getElementById('loader');
    const previewContainer = document.getElementById('preview-container');
    const canvas = document.getElementById('canvas');
    const downloadLink = document.getElementById('download-link');

    uploadInput.addEventListener('change', async (e) => {
        if (!imageCounter.canProcess()) {
            alert('❌ Limite de 50 imagens/mês atingido! Aguarde o próximo mês.');
            return;
        }

        const file = e.target.files[0];
        if (!file) return;

        // Simula processamento
        uploadLabel.style.display = 'none';
        loader.style.display = 'block';

        // ✅ Incrementa contador
        imageCounter.increment();

        setTimeout(() => {
            loader.style.display = 'none';
            previewContainer.style.display = 'block';

            // Processa imagem (simulação)
            const img = new Image();
            img.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                
                // Desenha imagem original
                ctx.drawImage(img, 0, 0);
                
                // Simula remoção de fundo (torna transparente)
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    // Simula detecção de fundo (pixels mais escuros)
                    if (data[i] < 50 && data[i+1] < 50 && data[i+2] < 50) {
                        data[i+3] = 0; // Torna transparente
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                downloadLink.href = canvas.toDataURL('image/png');
            };
            img.src = URL.createObjectURL(file);
        }, 3000);
    });

    // Download
    downloadLink.addEventListener('click', (e) => {
        // Força download do PNG transparente
        e.preventDefault();
        const link = document.createElement('a');
        link.download = 'cleancut-resultado.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>
