<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #0f0f23);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; overflow-x: hidden; position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #4dabf7, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(78, 171, 247, 0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #4dabf7, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(78, 171, 247, 0.6), transparent);
            background-repeat: repeat; background-size: 200px 100px;
            animation: float 20s linear infinite; pointer-events: none; z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px;
            padding: 50px 40px; max-width: 500px; width: 100%; text-align: center;
            position: relative; z-index: 1;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .app-icon {
            width: 120px; height: 120px; border-radius: 28px; margin: 0 auto 25px;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #4dabf7, #2196f3) padding-box,
                        linear-gradient(135deg, #4dabf7, #00d4ff, #4dabf7) border-box;
            box-shadow: 0 0 30px rgba(77, 171, 247, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease; animation: pulse 2s infinite; position: relative;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        h1 {
            font-size: 2.8rem; font-weight: 800;
            background: linear-gradient(135deg, #4dabf7, #00d4ff, #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; letter-spacing: -1px;
        }

        .subtitle { color: rgba(255, 255, 255, 0.7); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.5; }

        .btn-upload {
            background: linear-gradient(135deg, #4dabf7, #2196f3);
            color: white; padding: 20px 50px; border-radius: 25px; cursor: pointer;
            font-weight: 600; font-size: 1.1rem; transition: all 0.4s;
            display: inline-flex; align-items: center; gap: 12px; border: none; text-decoration: none;
            position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(77, 171, 247, 0.4);
        }

        .btn-upload::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn-upload:hover::before { left: 100%; }
        .btn-upload:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(77, 171, 247, 0.6); }

        input[type="file"] { display: none; }

        .loader { display: none; margin-top: 35px; color: #4dabf7; font-size: 1.1rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(77, 171, 247, 0.2); border-top: 3px solid #4dabf7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #preview-container { margin-top: 40px; display: none; animation: fadeInUp 0.6s ease-out; }
        .preview-title { color: #4dabf7; font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; }

        canvas {
            max-width: 100%; border-radius: 20px;
            background-image: linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%);
            background-size: 30px 30px; border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .btn-download { background: linear-gradient(135deg, #2e7d32, #4caf50); margin-top: 25px; }
        .credit { margin-top: 40px; padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 20px; color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }
        .credit a { color: #4dabf7; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-icon" style="background: url('p_diddy_icon.png') center/cover; background-color: #1a1a2e;">
        <i class="fas fa-cut" style="font-size: 3rem; color: #4dabf7; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></i>
    </div>
    
    <h1>CleanCut</h1>
    <p class="subtitle">✨ IA de elite ilimitada<br><span style="font-size: 0.9em; opacity: 0.8;">Processamento local • Sem créditos</span></p>

    <label for="upload" class="btn-upload">
        <i class="fas fa-cloud-upload-alt"></i> SELECIONAR IMAGEM
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p id="status-text">Otimizando imagem...</p>
    </div>

    <div id="preview-container">
        <h3 class="preview-title">🎉 Resultado Perfeito!</h3>
        <canvas id="canvas"></canvas>
        <br>
        <a id="download-link" class="btn-upload btn-download">
            <i class="fas fa-download"></i> BAIXAR PNG
        </a>
    </div>

    <div class="credit">
        Feito com ❤️ por <a href="https://twitter.com/joaoxxr1" target="_blank">@joaoxxr1</a>
    </div>
</div>

<script>
    const upload = document.getElementById('upload');

    const statusText = document.getElementById('status-text');

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadLink = document.getElementById('download-link');

    const MAX_SIZE = 1000; 

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        previewContainer.style.display = 'none';
        statusText.innerText = "Redimensionando para IA...";

        const resizeImage = (imgFile) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > MAX_SIZE || h > MAX_SIZE) {
                        const s = Math.min(MAX_SIZE / w, MAX_SIZE / h);
                        w *= s; h *= s;
                    }
                    const c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    c.toBlob(resolve, 'image/jpeg', 0.7);
                };
                img.src = URL.createObjectURL(imgFile);
            });
