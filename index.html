<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #0f0f23);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #4dabf7, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(78, 171, 247, 0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #4dabf7, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(78, 171, 247, 0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 25px;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #4dabf7, #2196f3) padding-box,
                        linear-gradient(135deg, #4dabf7, #00d4ff, #4dabf7) border-box;
            box-shadow: 
                0 0 30px rgba(77, 171, 247, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .app-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 50px rgba(77, 171, 247, 0.6);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4dabf7, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-upload {
            background: linear-gradient(135deg, #4dabf7, #2196f3);
            color: white;
            padding: 20px 50px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: none;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(77, 171, 247, 0.4);
        }

        .btn-upload::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn-upload:hover::before {
            left: 100%;
        }

        .btn-upload:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(77, 171, 247, 0.6);
        }

        .btn-upload:active {
            transform: translateY(-2px) scale(1);
        }

        input[type="file"] { display: none; }

        .loader {
            display: none;
            margin-top: 35px;
            color: #4dabf7;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(77, 171, 247, 0.2);
            border-top: 3px solid #4dabf7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #preview-container {
            margin-top: 40px;
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preview-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #4dabf7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        canvas:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(77, 171, 247, 0.2);
        }

        .btn-download {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            margin-top: 25px;
            padding: 18px 45px;
            font-size: 1.1rem;
        }

        .credit {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .credit a {
            color: #4dabf7;
            text-decoration: none;
            font-weight: 600;
        }

        .credit a:hover {
            color: #00d4ff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
                margin: 10px;
            }
            h1 { font-size: 2.2rem; }
            .app-icon { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Ícone animado com efeito glass -->
    <div class="app-icon" style="
        background: url('p_diddy_icon.png') center/cover;
        background-color: #1a1a2e;
    ">
        <i class="fas fa-cut" style="font-size: 3rem; color: #4dabf7; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></i>
    </div>
    
    <h1>CleanCut</h1>
    <p class="subtitle">✨ IA de elite para remover fundos em segundos<br><span style="font-size: 0.9em; opacity: 0.8;">Tecnologia profissional • Resultados perfeitos</span></p>

    <label for="upload" class="btn-upload">
        <i class="fas fa-cloud-upload-alt"></i>
        SELECIONAR IMAGEM
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">
        <div class="spinner"></div>
        Processando com IA de ponta... <span style="font-size: 0.9em;">(pode levar alguns segundos)</span>
    </div>

    <div id="preview-container">
        <h3 class="preview-title">🎉 Resultado Perfeito!</h3>
        <canvas id="canvas"></canvas>
        <br>
        <a id="download-link" class="btn-upload btn-download">
            <i class="fas fa-download"></i>
            BAIXAR PNG TRANSPARENTE
        </a>
    </div>

    <div class="credit">
        <i class="fas fa-heart" style="color: #ff6b9d;"></i>
        Feito com ❤️ por <a href="https://twitter.com/joaoxxr1" target="_blank">@joaoxxr1</a>
    </div>
</div>

<script>
    // Sua chave de API mantida
    const API_KEY = "WL2ETBv1shPw9Xg6U6x7TgFU"; 

    const upload = document.getElementById('upload');
    const loader = document.getElementById('loader');
    const previewContainer = document.getElementById('preview-container');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadLink = document.getElementById('download-link');

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loader.style.display = 'block';
        previewContainer.style.display = 'none';
        upload.parentElement.style.pointerEvents = 'none';

        const formData = new FormData();
        formData.append("image_file", file);
        formData.append("size", "auto");

        try {
            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    loader.style.display = 'none';
                    previewContainer.style.display = 'block';
                    upload.parentElement.style.pointerEvents = 'auto';
                    
                    downloadLink.href = url;
                    downloadLink.download = `cleancut_${Date.now()}_sem_fundo.png`;
                };
                img.src = url;
            } else {
                const errorData = await response.json();
                alert("Erro da IA: " + (errorData.errors?.[0]?.title || "Limite de uso excedido"));
                loader.style.display = 'none';
                upload.parentElement.style.pointerEvents = 'auto';
            }
        } catch (error) {
            alert("Erro de conexão. Verifique sua internet!");
            loader.style.display = 'none';
            upload.parentElement.style.pointerEvents = 'auto';
        }
    });

    // Efeito de drag & drop
    const container = document.querySelector('.container');
    container.addEventListener('dragover', (e) => {
        e.preventDefault();
        container.style.background = 'rgba(77, 171, 247, 0.1)';
    });
    container.addEventListener('dragleave', () => {
        container.style.background = 'rgba(255, 255, 255, 0.05)';
    });
    container.addEventListener('drop', (e) => {
        e.preventDefault();
        container.style.background = 'rgba(255, 255, 255, 0.05)';
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            upload.files = files;
            upload.dispatchEvent(new Event('change'));
        }
    });
</script>

</body>
    </html>
