<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - Apagador de Fundo Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Partículas de fundo animadas */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #4dabf7, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 90px 40px, #4dabf7, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.4), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .main-card {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 32px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                0 0 0 1px rgba(77, 171, 247, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #4dabf7, #2196f3) border-box;
            padding: 4px;
            box-shadow: 
                0 0 40px rgba(77, 171, 247, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: cover;
        }

        .app-icon:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 60px rgba(77, 171, 247, 0.6);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4dabf7 0%, #2196f3 50%, #21cbf3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        #info-credito {
            background: linear-gradient(135deg, rgba(77, 171, 247, 0.15), rgba(33, 150, 243, 0.1));
            backdrop-filter: blur(10px);
            color: #4dabf7;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(77, 171, 247, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 25px rgba(77, 171, 247, 0.15);
            transition: all 0.3s ease;
        }

        #info-credito:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(77, 171, 247, 0.25);
        }

        .btn-upload {
            position: relative;
            background: linear-gradient(135deg, #4dabf7 0%, #2196f3 50%, #21cbf3 100%);
            color: white;
            padding: 1.2rem 3rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            border: none;
            text-decoration: none;
            overflow: hidden;
            box-shadow: 
                0 12px 35px rgba(77, 171, 247, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-upload::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn-upload:hover::before {
            left: 100%;
        }

        .btn-upload:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 20px 50px rgba(77, 171, 247, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }

        input[type="file"] { display: none; }

        #preview-container {
            margin-top: 2.5rem;
            display: none;
            animation: fadeInScale 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes fadeInScale {
            from { 
                opacity: 0; 
                transform: scale(0.9) translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0);
            }
        }

        canvas {
            max-width: 100%;
            border-radius: 20px;
            background-image: 
                linear-gradient(45deg, rgba(37,37,37,0.8) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(37,37,37,0.8) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(37,37,37,0.8) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(37,37,37,0.8) 75%);
            background-size: 24px 24px;
            background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
            border: 2px solid rgba(77, 171, 247, 0.3);
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(1px);
        }

        .loader {
            display: none;
            margin-top: 1.5rem;
            color: #4dabf7;
            font-size: 1rem;
            font-style: italic;
        }

        .loader i {
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .main-card {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 2.2rem;
            }
        }

        /* Scroll suave */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <img src="p_diddy_icon.png" alt="CleanCut Icon" class="app-icon">
            
            <h1>CleanCut</h1>
            <p class="subtitle">Apagador de Fundo Premium</p>
            
            <div id="info-credito">
                <i class="fas fa-crown"></i>
                Powered by IA Avançada
            </div>

            <label for="file-input" class="btn-upload">
                <i class="fas fa-cloud-upload-alt"></i>
                Escolher Imagem
            </label>
            <input type="file" id="file-input" accept="image/*">

            <div class="loader" id="loader">
                <i class="fas fa-spinner"></i>
                Processando sua imagem...
            </div>

            <div id="preview-container">
                <canvas id="preview-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Seu JavaScript aqui (mantive compatível)
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Sua lógica de processamento aqui
                    document.getElementById('loader').style.display = 'block';
                    document.getElementById('preview-container').style.display = 'block';
                    
                    setTimeout(() => {
                        // Simulação de processamento
                        const canvas = document.getElementById('preview-canvas');
                        const ctx = canvas.getContext('2d');
                        const img = new Image();
                        img.onload = function() {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            document.getElementById('loader').style.display = 'none';
                        };
                        img.src = e.target.result;
                    }, 2000);
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
