<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCut - IA Ilimitada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        /* MANTIVE O TEU DESIGN BRABO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #0f0f23);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; padding: 50px 40px; max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        .app-icon {
            width: 120px; height: 120px; border-radius: 28px; margin: 0 auto 25px;
            border: 3px solid #4dabf7; background: url('p_diddy_icon.png') center/cover;
            box-shadow: 0 0 30px rgba(77, 171, 247, 0.4);
        }

        h1 { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #4dabf7, #00d4ff, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: rgba(255, 255, 255, 0.7); margin-bottom: 30px; font-size: 0.9rem; }

        #status-ia { color: #4dabf7; font-weight: 600; margin-bottom: 20px; display: block; }

        .btn-upload {
            background: linear-gradient(135deg, #4dabf7, #2196f3);
            color: white; padding: 20px 40px; border-radius: 25px; cursor: pointer;
            font-weight: 600; display: inline-flex; align-items: center; gap: 12px; border: none;
            transition: 0.4s; text-decoration: none;
        }

        .loader { display: none; margin-top: 35px; color: #4dabf7; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(77, 171, 247, 0.2); border-top: 3px solid #4dabf7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #result-img { max-width: 100%; border-radius: 20px; margin-top: 30px; display: none; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-download { background: linear-gradient(135deg, #2e7d32, #4caf50); margin-top: 20px; display: none; }
        
        .credit { margin-top: 40px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="app-icon"></div>
    <h1>CleanCut</h1>
    <p class="subtitle">✨ IA Ilimitada: Remova fundos sem limites</p>

    <span id="status-ia">Pronto para editar!</span>

    <label for="upload" class="btn-upload" id="label-upload">
        <i class="fas fa-magic"></i> ESCOLHER FOTO
    </label>
    <input type="file" id="upload" accept="image/*">

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p id="loader-text">A IA está a trabalhar...</p>
    </div>

    <img id="result-img" alt="Resultado">
    
    <a id="download-link" class="btn-upload btn-download">
        <i class="fas fa-download"></i> BAIXAR PNG
    </a>

    <div class="credit">
        Design de elite por <a href="#" style="color: #4dabf7; text-decoration: none;">@joaoxxr1</a>
    </div>
</div>

<script>
    // Importando a função de remoção
    const { removeBackground } = imglyRemoveBackground;

    const upload = document.getElementById('upload');
    const loader = document.getElementById('loader');
    const statusIa = document.getElementById('status-ia');
    const resultImg = document.getElementById('result-img');
    const downloadLink = document.getElementById('download-link');

    upload.addEventListener('change', async (e) => {
        let file = e.target.files[0];
        if (!file) return;

        loader.style.display = 'block';
        resultImg.style.display = 'none';
        downloadLink.style.display = 'none';
        statusIa.innerText = "Preparando imagem...";

        try {
            // A MÁGICA: Remove o fundo rodando localmente
            // Adicionei uma configuração de progresso para dar feedback
            const blob = await imglyRemoveBackground(file, {
                debug: true,
                model: 'medium', // Usa o modelo médio para não travar
                output: {
                    type: 'image/png',
                    quality: 0.8
                }
            });
            
            const url = URL.createObjectURL(blob);
            resultImg.src = url;
            resultImg.style.display = 'block';
            
            downloadLink.href = url;
            downloadLink.download = `cleancut_${Date.now()}.png`;
            downloadLink.style.display = 'inline-flex';

            loader.style.display = 'none';
            statusIa.innerText = "Concluído! ✅";
        } catch (error) {
            console.error(error);
            // Se der erro de memória, avisamos de forma elegante
            alert("Essa foto é muito pesada para o navegador. Tente uma foto com menos de 5MB!");
            loader.style.display = 'none';
            statusIa.innerText = "Erro no processamento.";
        }
    });
                </script>
